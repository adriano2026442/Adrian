<title>SUPER MOTION PROJECT</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  background:#000;
  overflow-x:hidden;
  color:white;
}

/* HERO */
.hero{
  height:100vh;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  overflow:hidden;
}

.hero img{
  position:absolute;
  width:120%;
  height:120%;
  object-fit:cover;
  filter:contrast(1.2) saturate(1.3);
  animation: zoomPan 10s infinite alternate ease-in-out;
}

@keyframes zoomPan{
  0%{transform:scale(1) translate(0px,0px);}
  100%{transform:scale(1.2) translate(-40px,-20px);}
}

.overlay{
  position:absolute;
  width:100%;
  height:100%;
  background:radial-gradient(circle, rgba(0,0,0,0.2), rgba(0,0,0,0.9));
}

.title{
  z-index:2;
  font-size:4vw;
  letter-spacing:8px;
  animation: glitch 2s infinite;
}

@keyframes glitch{
  0%{transform:translate(0);}
  20%{transform:translate(-2px,2px);}
  40%{transform:translate(2px,-2px);}
  60%{transform:translate(-1px,1px);}
  80%{transform:translate(1px,-1px);}
  100%{transform:translate(0);}
}

/* SCROLL SECTION */
.section{
  padding:100px 10%;
}

.card-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:#111;
  padding:20px;
  border-radius:20px;
  transform:translateY(50px);
  opacity:0;
  transition:all 1s ease;
}

.card.show{
  transform:translateY(0);
  opacity:1;
}

.card:hover{
  transform:scale(1.05);
  background:#1a1a1a;
}

  background:rgba(255,255,255,0.08);
  animation: float 6s infinite ease-in-out;
}
